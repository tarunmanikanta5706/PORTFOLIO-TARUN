<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Gayatri Vankayala - Portfolio Coming Soon" />
  <title>Gayatri Vankayala | Portfolio</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --border: rgba(255,255,255,0.07);
      --purple: #a855f7;
      --pink: #ec4899;
      --cyan: #06b6d4;
      --white: #f1f5f9;
      --muted: #64748b;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Background ── */
    .bg-orbs {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: var(--purple); top: -150px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: var(--pink);   bottom: -100px; right: -80px;  animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: var(--cyan);   top: 40%; left: 50%; animation-delay: -8s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* ── Grid overlay ── */
    .grid-overlay {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(168,85,247,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(168,85,247,0.04) 1px, transparent 1px);
      background-size: 50px 50px;
    }

    /* ── Main card ── */
    .card {
      position: relative; z-index: 2;
      text-align: center;
      padding: 3.5rem 2.5rem;
      max-width: 680px;
      width: 92%;
      background: rgba(19,19,26,0.7);
      border: 1px solid var(--border);
      border-radius: 28px;
      backdrop-filter: blur(20px);
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
      animation: fadeUp 0.9s ease both;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Avatar ring ── */
    .avatar-wrap {
      position: relative;
      display: inline-block;
      margin-bottom: 1.8rem;
    }
    .avatar-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--purple), var(--pink), var(--cyan));
      padding: 3px;
      animation: spin-ring 8s linear infinite;
    }
    @keyframes spin-ring {
      to { filter: hue-rotate(360deg); }
    }
    .avatar-inner {
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--surface);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.4rem;
    }

    /* ── Status badge ── */
    .status-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(168,85,247,0.12);
      border: 1px solid rgba(168,85,247,0.35);
      color: var(--purple);
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 1.5rem;
    }
    .pulse-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--purple);
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.4; transform: scale(0.7); }
    }

    /* ── Headline ── */
    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      line-height: 1.1;
      margin-bottom: 0.6rem;
      background: linear-gradient(120deg, #ffffff 0%, var(--purple) 50%, var(--pink) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .tagline {
      font-size: 1.05rem;
      color: var(--muted);
      margin-bottom: 2rem;
      font-weight: 400;
    }
    .tagline span {
      color: var(--cyan);
      font-family: 'Space Mono', monospace;
      font-size: 0.95rem;
    }

    /* ── Divider ── */
    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--pink));
      border-radius: 99px;
      margin: 0 auto 1.8rem;
    }

    /* ── Description ── */
    p.desc {
      color: #94a3b8;
      font-size: 1rem;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    /* ── Notify form ── */
    .notify-form {
      display: flex; gap: 10px;
      max-width: 420px;
      margin: 0 auto 2.5rem;
    }
    .notify-form input {
      flex: 1;
      padding: 12px 18px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--white);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .notify-form input:focus { border-color: var(--purple); }
    .notify-form input::placeholder { color: var(--muted); }
    .btn-notify {
      padding: 12px 22px;
      background: linear-gradient(135deg, var(--purple), var(--pink));
      border: none; border-radius: 12px;
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: 0.95rem; font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
      white-space: nowrap;
    }
    .btn-notify:hover { opacity: 0.88; transform: translateY(-1px); }

    /* ── Social links ── */
    .socials {
      display: flex; gap: 14px; justify-content: center;
    }
    .social-link {
      display: flex; align-items: center; justify-content: center;
      width: 44px; height: 44px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted);
      text-decoration: none;
      font-size: 1.1rem;
      transition: background 0.2s, color 0.2s, transform 0.15s, border-color 0.2s;
    }
    .social-link:hover {
      background: rgba(168,85,247,0.15);
      border-color: var(--purple);
      color: var(--purple);
      transform: translateY(-3px);
    }

    /* ── Footer ── */
    footer {
      position: relative; z-index: 2;
      margin-top: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      animation: fadeUp 1.1s 0.3s ease both;
    }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: #1e1e2e;
      border: 1px solid rgba(168,85,247,0.4);
      color: var(--white);
      padding: 14px 24px;
      border-radius: 14px;
      font-size: 0.9rem;
      transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 999;
      pointer-events: none;
    }
    .toast.show { transform: translateX(-50%) translateY(0); }

    @media (max-width: 500px) {
      .notify-form { flex-direction: column; }
      .card { padding: 2.5rem 1.5rem; }
    }
  </style>
</head>
<body>

  <!-- Background elements -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="grid-overlay"></div>

  <!-- Main card -->
  <main class="card" id="main">
    <!-- Avatar -->
    <div class="avatar-wrap">
      <div class="avatar-ring">
        <div class="avatar-inner">✨</div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-badge">
      <div class="pulse-dot"></div>
      Something exciting is coming
    </div>

    <!-- Headline -->
    <h1>Gayatri Vankayala</h1>
    <p class="tagline">
      <span>// portfolio under construction</span>
    </p>

    <div class="divider"></div>

    <p class="desc">
      I'm crafting a portfolio experience that reflects my work, creativity, and passion.
      It's almost ready — check back soon and prepare to be impressed. 🚀
    </p>

    <!-- Notify -->
    <form class="notify-form" id="notifyForm" onsubmit="handleNotify(event)">
      <input type="email" id="emailInput" placeholder="your@email.com" autocomplete="off" />
      <button class="btn-notify" type="submit">Notify Me</button>
    </form>

    <!-- Socials -->
    <div class="socials">
      <a href="https://github.com/vankayala-gayatri" target="_blank" rel="noopener" class="social-link" title="GitHub">
        <!-- GitHub SVG -->
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/></svg>
      </a>
      <a href="https://linkedin.com/in/gayatri-vankayala" target="_blank" rel="noopener" class="social-link" title="LinkedIn">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      </a>
      <a href="mailto:gayatri@example.com" class="social-link" title="Email">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
      </a>
      <a href="https://twitter.com/gayatri_v" target="_blank" rel="noopener" class="social-link" title="Twitter / X">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>
  </main>

  <footer>
    &copy; 2026 Gayatri Vankayala &mdash; Portfolio coming soon ✦
  </footer>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    function handleNotify(e) {
      e.preventDefault();
      const email = document.getElementById('emailInput').value.trim();
      if (!email) return;
      showToast('🎉 You\'ll be notified when the portfolio launches!');
      document.getElementById('emailInput').value = '';
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3200);
    }
  </script>
</body>
</html>
